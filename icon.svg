<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="starRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4757"/>
      <stop offset="35%" stop-color="#ee2222"/>
      <stop offset="70%" stop-color="#cc1111"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
    <linearGradient id="starHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b7a"/>
      <stop offset="50%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#e03e4d"/>
    </linearGradient>
    <linearGradient id="starDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#550000"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff475744"/>
      <stop offset="60%" stop-color="#ff475711"/>
      <stop offset="100%" stop-color="#ff47570000"/>
    </radialGradient>
    <linearGradient id="metalEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c0c0"/><stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#888888"/><stop offset="75%" stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/><stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- 外层光晕 -->
  <circle cx="256" cy="256" r="180" fill="url(#halo)"/>

  <!-- 装饰环 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffffff10" stroke-width="1.5" stroke-dasharray="8 6"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#ff475720" stroke-width="0.8"/>

  <!-- ===== 四角星 - 3D立体效果 ===== -->
  <!-- 厚度层（底部偏移，暗色） -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <!-- 底部厚度 - 下 -->
    <polygon points="0,-175 -22,-45 -175,0 -22,12 0,165 22,12 175,0 22,-45"
             fill="url(#starDark)" transform="translate(5,8)"/>
    
    <!-- 主星体 - 上半面（高光） -->
    <polygon points="0,-175 -22,-45 0,0 22,-45" fill="url(#starHighlight)"/>
    <!-- 右上 -->
    <polygon points="-22,-45 -175,0 0,0" fill="url(#starRed)"/>
    <!-- 右下 -->
    <polygon points="-175,0 -22,12 0,0" fill="url(#starDark)"/>
    <!-- 下 -->
    <polygon points="-22,12 0,165 0,0" fill="url(#starRed)"/>
    <!-- 左下 -->
    <polygon points="0,165 22,12 0,0" fill="url(#starHighlight)"/>
    <!-- 左上 -->
    <polygon points="22,12 175,0 0,0" fill="url(#starRed)"/>
    <!-- 上右 -->
    <polygon points="175,0 22,-45 0,0" fill="url(#starHighlight)"/>

    <!-- 金属边框描边 -->
    <polygon points="0,-175 -22,-45 -175,0 -22,12 0,165 22,12 175,0 22,-45"
             fill="none" stroke="url(#metalEdge)" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- 内部分割线（3D棱线） -->
    <line x1="0" y1="0" x2="0" y2="-175" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-175" y2="0" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="165" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="175" y2="0" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-22" y2="-45" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-22" y2="12" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="22" y2="12" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="22" y2="-45" stroke="url(#metalEdge)" stroke-width="1.5" opacity="0.6"/>

    <!-- 中心宝石高光 -->
    <circle cx="0" cy="0" r="14" fill="url(#goldAccent)" opacity="0.9"/>
    <circle cx="-3" cy="-3" r="5" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- BJX 文字标识 -->
  <text x="256" y="462" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="52" font-weight="900" fill="url(#goldAccent)" letter-spacing="12">BJX</text>
  
  <!-- BJX 发光底层 -->
  <text x="256" y="462" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="52" font-weight="900" fill="none" stroke="#ff4757" stroke-width="1" letter-spacing="12" opacity="0.4">BJX</text>

  <!-- 顶部科技装饰弧线 -->
  <path d="M140,80 Q256,40 372,80" fill="none" stroke="url(#goldAccent)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <circle cx="140" cy="80" r="3" fill="#ffd700" opacity="0.7"/>
  <circle cx="372" cy="80" r="3" fill="#ffd700" opacity="0.7"/>
</svg>