<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务工作驾驶舱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a1a;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;font-family:'Microsoft YaHei',Arial,sans-serif;
}

/* ── 粒子背景 ── */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,71,87,.8) 0%,transparent 70%);
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:.6}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ── 网格地面 ── */
.grid-floor{
  position:fixed;bottom:0;left:0;width:100%;height:40%;
  background:
    linear-gradient(90deg,rgba(37,99,235,.08) 1px,transparent 1px),
    linear-gradient(0deg,rgba(37,99,235,.08) 1px,transparent 1px);
  background-size:60px 60px;
  transform:perspective(500px) rotateX(60deg);
  transform-origin:center bottom;
  z-index:0;
}
.grid-floor::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,#0a0a1a,transparent);
}

/* ── 主容器 ── */
.splash-container{
  position:relative;z-index:10;text-align:center;
  animation:fadeInUp .8s ease-out both;
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── 图标容器（3D旋转） ── */
.icon-wrap{
  width:160px;height:160px;margin:0 auto 28px;
  position:relative;
  animation:iconFloat 3s ease-in-out infinite, iconGlow 2s ease-in-out infinite alternate;
}
@keyframes iconFloat{
  0%,100%{transform:translateY(0) rotateY(0deg)}
  50%{transform:translateY(-12px) rotateY(8deg)}
}
@keyframes iconGlow{
  from{filter:drop-shadow(0 0 20px rgba(255,71,87,.4))}
  to{filter:drop-shadow(0 0 40px rgba(255,71,87,.8)) drop-shadow(0 0 80px rgba(37,99,235,.3))}
}

.icon-wrap img{width:100%;height:100%;border-radius:36px}

/* ── 光环旋转 ── */
.ring{
  position:absolute;top:-20px;left:-20px;right:-20px;bottom:-20px;
  border:2px solid transparent;
  border-top-color:#ff475780;border-right-color:#2563eb60;
  border-radius:50%;
  animation:spin 3s linear infinite;
}
.ring:nth-child(2){
  top:-35px;left:-35px;right:-35px;bottom:-35px;
  border-top-color:#ffd70050;border-left-color:#ff475730;
  animation-duration:5s;animation-direction:reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 标题 ── */
.title{
  font-size:32px;font-weight:900;color:#fff;
  letter-spacing:6px;text-transform:uppercase;
  background:linear-gradient(135deg,#fff 0%,#ff4757 50%,#ffd700 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
  animation:titleShine 3s linear infinite;
  background-size:200% auto;
}
@keyframes titleShine{to{background-position:200% center}}

.subtitle{
  font-size:14px;color:rgba(255,255,255,.45);letter-spacing:4px;
  margin-bottom:40px;
}

/* ── 加载条 ── */
.loader-wrap{width:220px;margin:0 auto;position:relative}
.loader-bar{
  height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;
}
.loader-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#ff4757,#ffd700,#2563eb,#ff4757);
  background-size:300% 100%;
  border-radius:3px;
  animation:loadFill 2.5s ease-in-out forwards, loadShine 1.5s linear infinite;
}
@keyframes loadFill{to{width:100%}}
@keyframes loadShine{to{background-position:300% 0}}

.loader-dots{display:flex;justify-content:center;gap:8px;margin-top:16px}
.dot{
  width:8px;height:8px;border-radius:50%;background:#ff4757;
  animation:bounce 1.4s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.2s;background:#ffd700}
.dot:nth-child(3){animation-delay:.4s;background:#2563eb}
@keyframes bounce{
  0%,80%,100%{transform:scale(.5);opacity:.4}
  40%{transform:scale(1.2);opacity:1}
}

/* ── 底部信息 ── */
.footer-info{
  position:fixed;bottom:32px;width:100%;text-align:center;
  font-size:12px;color:rgba(255,255,255,.25);letter-spacing:2px;z-index:10;
}

/* ── 扫描线效果 ── */
.scanline{
  position:fixed;top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,71,87,.15),rgba(37,99,235,.15),transparent);
  animation:scan 3s linear infinite;z-index:5;pointer-events:none;
}
@keyframes scan{0%{top:-2px}100%{top:100%}}
</style>
</head>
<body>

<!-- 粒子背景 -->
<div class="particles" id="particles"></div>
<!-- 网格地面 -->
<div class="grid-floor"></div>
<!-- 扫描线 -->
<div class="scanline"></div>

<!-- 主内容 -->
<div class="splash-container">
  <div class="icon-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <img src="icon-512.png" alt="BJX 驾驶舱"/>
  </div>
  <div class="title">业务工作驾驶舱</div>
  <div class="subtitle">BUSINESS COMMAND CENTER</div>
  <div class="loader-wrap">
    <div class="loader-bar"><div class="loader-fill"></div></div>
    <div class="loader-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
</div>

<div class="footer-info">POWERED BY BJX · v2026</div>

<script>
// 生成粒子
(function(){
  var c=document.getElementById('particles');
  for(var i=0;i<30;i++){
    var p=document.createElement('div');
    p.className='particle';
    var s=Math.random()*6+2;
    p.style.cssText='left:'+Math.random()*100+'%;width:'+s+'px;height:'+s+'px;'
      +'animation-duration:'+(Math.random()*8+6)+'s;animation-delay:'+(Math.random()*5)+'s;';
    c.appendChild(p);
  }
})();
// 加载完成后跳转
setTimeout(function(){window.location.href='./';},2800);
</script>
</body>
</html>
